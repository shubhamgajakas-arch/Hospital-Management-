]<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garden Boys - Hospital Management Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="preconnect" href="https://cdnjs.cloudflare.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js" defer></script>
<style>
  :root{
    --navy:#0B2545; --navy2:#13335C; --teal:#0E9C8C; --teal-d:#0A7567;
    --ink:#0F172A; --ink-soft:#5B6B82; --ink-faint:#8C9AAE;
    --line:#E4E9F0; --line-soft:#EEF2F7; --paper:#F4F6FA; --panel:#FFFFFF;
    --amber:#E5A331; --red:#D9534F; --blue:#3B6FE0; --green:#2FA66A;
    --tealtint:#E6F7F4; --bluetint:#EBF1FE; --ambertint:#FBF1DF; --redtint:#FBEAEA; --greentint:#E9F7EF;
    --radius:10px; --shadow:0 1px 2px rgba(15,23,42,.04), 0 4px 16px rgba(15,23,42,.04);
  }
  *{box-sizing:border-box;}
  body{margin:0; font-family:'Inter',-apple-system,sans-serif; background:var(--paper); color:var(--ink); font-size:14px;}
  .app{display:flex; min-height:100vh;}

  /* ===== SIDEBAR ===== */
  .sidebar{
    width:252px; background:var(--navy); color:#fff; flex-shrink:0;
    display:flex; flex-direction:column; height:100vh; position:sticky; top:0;
  }
  .sb-brand{
    display:flex; align-items:center; gap:10px; padding:18px 18px 14px;
    border-bottom:1px solid rgba(255,255,255,.08);
  }
  .sb-brand .mark{
    width:34px; height:34px; border-radius:9px; background:linear-gradient(135deg,var(--teal),#0B7A6E);
    display:flex; align-items:center; justify-content:center; font-family:'Manrope'; font-weight:800; font-size:15px; flex-shrink:0;
  }
  .sb-brand .name{font-family:'Manrope'; font-weight:800; font-size:15.5px; line-height:1.1;}
  .sb-brand .sub{font-size:10.5px; color:rgba(255,255,255,.5); margin-top:2px; letter-spacing:.02em;}
  .sb-search{padding:12px 14px;}
  .sb-search .box{
    display:flex; align-items:center; gap:7px; background:rgba(255,255,255,.07);
    border:1px solid rgba(255,255,255,.08); border-radius:8px; padding:7px 10px; color:rgba(255,255,255,.45); font-size:12.5px;
  }
  .sb-scroll{flex:1; overflow-y:auto; padding:4px 10px 14px;}
  .sb-scroll::-webkit-scrollbar{width:5px;}
  .sb-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15); border-radius:4px;}
  .sb-group{margin-top:14px;}
  .sb-group-label{
    font-size:10px; text-transform:uppercase; letter-spacing:.08em; font-weight:700;
    color:rgba(255,255,255,.35); padding:0 10px 6px;
  }
  .sb-item{
    display:flex; align-items:center; gap:10px; padding:8.5px 10px; border-radius:7px;
    color:rgba(255,255,255,.72); font-size:13px; cursor:pointer; margin-bottom:1px; position:relative;
  }
  .sb-item i{font-size:15px; width:16px; text-align:center; flex-shrink:0; color:rgba(255,255,255,.45);}
  .sb-item:hover{background:rgba(255,255,255,.06); color:#fff;}
  .sb-item.active{background:var(--teal); color:#fff; font-weight:600;}
  .sb-item.active i{color:#fff;}
  .sb-item .badge{
    margin-left:auto; font-size:9.5px; background:rgba(255,255,255,.14); padding:1px 6px; border-radius:8px; font-weight:700;
  }
  .sb-item.active .badge{background:rgba(255,255,255,.25);}
  .sb-foot{padding:12px 16px; border-top:1px solid rgba(255,255,255,.08); font-size:10.5px; color:rgba(255,255,255,.4);}

  /* ===== MAIN ===== */
  .main{flex:1; min-width:0; display:flex; flex-direction:column;}
  .topbar{
    height:60px; background:var(--panel); border-bottom:1px solid var(--line);
    display:flex; align-items:center; justify-content:space-between; padding:0 22px; position:sticky; top:0; z-index:5;
  }
  .crumb{font-size:11px; color:var(--ink-faint); margin-bottom:2px;}
  .crumb b{color:var(--ink-soft); font-weight:600;}
  .topbar-title{font-family:'Manrope'; font-weight:800; font-size:17px;}
  .topbar-right{display:flex; align-items:center; gap:16px;}
  .tb-search{
    display:flex; align-items:center; gap:7px; background:var(--paper); border:1px solid var(--line);
    border-radius:8px; padding:7px 12px; font-size:12.5px; color:var(--ink-faint); width:240px;
  }
  .tb-icon{
    width:34px; height:34px; border-radius:8px; display:flex; align-items:center; justify-content:center;
    border:1px solid var(--line); color:var(--ink-soft); position:relative; cursor:pointer; flex-shrink:0;
  }
  .tb-icon .dot{position:absolute; top:6px; right:7px; width:6px; height:6px; border-radius:50%; background:var(--red); border:1.5px solid #fff;}
  .tb-profile{display:flex; align-items:center; gap:9px; padding-left:14px; border-left:1px solid var(--line);}
  .avatar{
    width:34px; height:34px; border-radius:50%; background:var(--bluetint); color:var(--blue);
    display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12.5px; flex-shrink:0;
  }
  .tb-profile .who{font-size:12.5px; font-weight:600; line-height:1.2;}
  .tb-profile .role{font-size:10.5px; color:var(--ink-faint);}

  .content{padding:22px 26px 60px; max-width:1280px;}
  .screen{display:none;}
  .screen.active{display:block; animation:fade .15s ease;}
  @keyframes fade{from{opacity:0; transform:translateY(3px);} to{opacity:1; transform:none;}}

  .module-tag{
    display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:700; color:var(--teal-d);
    background:var(--tealtint); padding:4px 10px; border-radius:20px; margin-bottom:10px;
  }
  h1.scr{font-family:'Manrope'; font-weight:800; font-size:21px; margin:0 0 3px;}
  p.scr-sub{margin:0 0 20px; font-size:13px; color:var(--ink-soft);}

  /* ===== shared widgets ===== */
  .grid{display:grid; gap:16px;}
  .card{
    background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
    box-shadow:var(--shadow); padding:16px 18px;
  }
  .card-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;}
  .card-head h3{font-size:13.5px; font-weight:700; margin:0;}
  .card-head .more{font-size:11.5px; color:var(--teal-d); font-weight:600; cursor:pointer;}

  .kpis{grid-template-columns:repeat(4,1fr); margin-bottom:18px;}
  .kpi{
    background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:14px 16px;
    box-shadow:var(--shadow); position:relative; overflow:hidden;
  }
  .kpi .top{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}
  .kpi .ico{width:30px; height:30px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:14px;}
  .kpi .ico.blue{background:var(--bluetint); color:var(--blue);}
  .kpi .ico.teal{background:var(--tealtint); color:var(--teal-d);}
  .kpi .ico.amber{background:var(--ambertint); color:var(--amber);}
  .kpi .ico.red{background:var(--redtint); color:var(--red);}
  .kpi .ico.green{background:var(--greentint); color:var(--green);}
  .kpi .delta{font-size:10.5px; font-weight:700; padding:2px 6px; border-radius:10px;}
  .kpi .delta.up{background:var(--greentint); color:var(--green);}
  .kpi .delta.down{background:var(--redtint); color:var(--red);}
  .kpi .n{font-family:'Manrope'; font-weight:800; font-size:24px; line-height:1;}
  .kpi .l{font-size:11.5px; color:var(--ink-soft); margin-top:5px;}

  table{width:100%; border-collapse:collapse; font-size:12.5px;}
  thead th{
    text-align:left; padding:9px 10px; color:var(--ink-faint); font-weight:700; font-size:10.5px;
    text-transform:uppercase; letter-spacing:.04em; border-bottom:1.5px solid var(--line);
  }
  tbody td{padding:10px 10px; border-bottom:1px solid var(--line-soft); color:var(--ink); vertical-align:middle;}
  tbody tr:hover{background:var(--paper);}
  .tname{display:flex; align-items:center; gap:9px;}
  .tname .av{width:26px;height:26px;border-radius:50%;background:var(--paper);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--ink-soft);flex-shrink:0;}
  .tname .meta{font-size:11px; color:var(--ink-faint);}

  .status{display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:600; padding:3px 9px; border-radius:20px;}
  .status.green{background:var(--greentint); color:var(--green);}
  .status.amber{background:var(--ambertint); color:#946C0B;}
  .status.red{background:var(--redtint); color:var(--red);}
  .status.blue{background:var(--bluetint); color:var(--blue);}
  .status.gray{background:var(--line-soft); color:var(--ink-soft);}
  .status .d{width:6px; height:6px; border-radius:50%; background:currentColor;}

  .btn{
    display:inline-flex; align-items:center; gap:6px; border:1px solid var(--line); border-radius:8px;
    padding:8px 14px; font-size:12.5px; font-weight:600; cursor:pointer; background:#fff; color:var(--ink);
  }
  .btn:hover{border-color:var(--ink-faint);}
  .btn.primary{background:var(--teal); color:#fff; border-color:var(--teal);}
  .btn.primary:hover{background:var(--teal-d);}
  .btn.navy{background:var(--navy); color:#fff; border-color:var(--navy);}
  .btn.sm{padding:5px 10px; font-size:11.5px;}
  .btn-block{width:100%; justify-content:center;}
  .btn-block + .btn-block{margin-top:8px;}

  .label{font-size:11px; font-weight:600; color:var(--ink-soft); margin-bottom:5px; display:block;}
  .field{
    width:100%; border:1px solid var(--line); border-radius:8px; padding:9px 11px; font-size:12.5px;
    color:var(--ink); margin-bottom:12px; background:#fff; font-family:inherit;
  }
  .field::placeholder{color:var(--ink-faint);}
  .field-row{display:flex; gap:10px;}
  .field-row .field{flex:1;}

  .tabbar{display:flex; gap:2px; border-bottom:1.5px solid var(--line); margin-bottom:18px;}
  .tabbar .t{
    font-size:12.5px; font-weight:600; padding:9px 14px; color:var(--ink-faint); cursor:pointer;
    border-bottom:2px solid transparent; margin-bottom:-1.5px;
  }
  .tabbar .t.on{color:var(--teal-d); border-bottom-color:var(--teal);}

  .progress{height:6px; background:var(--line-soft); border-radius:4px; overflow:hidden; margin-top:6px;}
  .progress > div{height:100%; background:var(--teal); border-radius:4px;}

  .bedgrid{display:grid; grid-template-columns:repeat(10,1fr); gap:7px;}
  .bed{
    aspect-ratio:1; border-radius:7px; display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-size:9.5px; font-weight:700; border:1px solid var(--line); cursor:pointer; gap:1px;
  }
  .bed i{font-size:13px;}
  .bed.free{background:var(--greentint); color:var(--green); border-color:#cfeedb;}
  .bed.occ{background:var(--bluetint); color:var(--blue); border-color:#d6e3fc;}
  .bed.crit{background:var(--redtint); color:var(--red); border-color:#f6cfcf;}
  .bed.clean{background:var(--ambertint); color:#946C0B; border-color:#f3e3bd;}

  .legend{display:flex; gap:16px; margin-top:12px; font-size:11.5px; color:var(--ink-soft); flex-wrap:wrap;}
  .legend span{display:inline-flex; align-items:center; gap:6px;}
  .legend i{width:10px; height:10px; border-radius:3px; display:inline-block;}

  .twocol{display:grid; grid-template-columns:1.55fr 1fr; gap:16px; align-items:start;}
  .twocol-r{display:grid; grid-template-columns:1fr 1.55fr; gap:16px; align-items:start;}

  .doc-card{display:flex; gap:11px; align-items:center; padding:11px; border:1px solid var(--line); border-radius:9px; margin-bottom:9px;}
  .doc-card .av{width:38px;height:38px;border-radius:9px;background:var(--bluetint);color:var(--blue);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;}
  .doc-card .info{flex:1; min-width:0;}
  .doc-card .info .n{font-weight:600; font-size:12.5px;}
  .doc-card .info .s{font-size:11px; color:var(--ink-faint);}

  .mini-stat{display:flex; align-items:center; justify-content:space-between; padding:9px 0; border-bottom:1px dashed var(--line);}
  .mini-stat:last-child{border-bottom:none;}
  .mini-stat .l{font-size:12px; color:var(--ink-soft);}
  .mini-stat .v{font-size:12.5px; font-weight:700;}

  .module-grid{grid-template-columns:repeat(3,1fr);}
  .module-card{
    background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:16px;
    box-shadow:var(--shadow); cursor:pointer;
  }
  .module-card:hover{border-color:var(--teal);}
  .module-card .ico{width:36px; height:36px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:16px; margin-bottom:10px;}
  .module-card .t{font-weight:700; font-size:13px; margin-bottom:3px;}
  .module-card .d{font-size:11.5px; color:var(--ink-faint); line-height:1.5;}
  .module-card .phase{display:inline-block; margin-top:9px; font-size:10px; font-weight:700; padding:2px 8px; border-radius:10px;}

  .alert{display:flex; gap:10px; align-items:flex-start; padding:10px 12px; border-radius:9px; font-size:12px; margin-bottom:8px;}
  .alert.amber{background:var(--ambertint); color:#7A5A09;}
  .alert.red{background:var(--redtint); color:#A33;}
  .alert.blue{background:var(--bluetint); color:#2456C9;}
  .alert i{margin-top:1px;}

  .chartwrap{height:230px; position:relative;}
  .chartwrap.sm{height:160px;}

  .empty-note{
    border:1.5px dashed var(--line); border-radius:9px; padding:24px; text-align:center; color:var(--ink-faint); font-size:12px;
  }
  .sb-item:focus-visible, .module-card:focus-visible{
    outline:2px solid var(--teal); outline-offset:-2px;
  }
  @media (prefers-reduced-motion: reduce){
    .screen.active{animation:none;}
  }
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="sb-brand">
      <div class="mark">SC</div>
      <div>
        <div class="name">Garden Boys</div>
        <div class="sub">Govt. Hospital Suite</div>
      </div>
    </div>
    <div class="sb-search">
      <div class="box"><i class="bi bi-search"></i> Search modules, patients...</div>
    </div>
    <div class="sb-scroll" id="navScroll"></div>
    <div class="sb-foot">GMH Nashik &nbsp;·&nbsp; v0.3 prototype</div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div>
        <div class="crumb">Hospital ops <i class="bi bi-chevron-right" style="font-size:8px;"></i> <b id="crumbNow">Dashboard</b></div>
        <div class="topbar-title" id="titleNow">Dashboard</div>
      </div>
      <div class="topbar-right">
        <div class="tb-search"><i class="bi bi-search"></i> Quick search...</div>
        <div class="tb-icon"><i class="bi bi-bell"></i><span class="dot"></span></div>
        <div class="tb-icon"><i class="bi bi-question-circle"></i></div>
        <div class="tb-profile">
          <div class="avatar">RS</div>
          <div>
            <div class="who">Dr. Adarsh</div>
            <div class="role">Medical Superintendent</div>
          </div>
          <i class="bi bi-chevron-down" style="font-size:10px;color:var(--ink-faint);"></i>
        </div>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<script>
/* ============== NAV CONFIG ============== */
const NAV = [
  {group:'Overview', items:[
    {id:'dashboard', label:'Dashboard', icon:'bi-grid-1x2'},
    {id:'modulemap', label:'All modules', icon:'bi-diagram-3', badge:'28'},
  ]},
  {group:'Outpatient', items:[
    {id:'registration', label:'Registration & ABHA', icon:'bi-person-vcard'},
    {id:'opd', label:'OPD queue & appointments', icon:'bi-calendar2-check'},
    {id:'emr', label:'EMR / case papers', icon:'bi-file-earmark-medical'},
  ]},
  {group:'Inpatient', items:[
    {id:'ipd', label:'IPD & ward / bed mgmt', icon:'bi-hospital'},
    {id:'ot', label:'Operation theatre', icon:'bi-scissors'},
    {id:'emergency', label:'Emergency / casualty', icon:'bi-activity'},
  ]},
  {group:'Diagnostics & pharmacy', items:[
    {id:'pharmacy', label:'Pharmacy', icon:'bi-capsule'},
    {id:'lab', label:'Laboratory (LIS)', icon:'bi-droplet-half'},
    {id:'radiology', label:'Radiology (RIS)', icon:'bi-radioactive'},
    {id:'bloodbank', label:'Blood bank', icon:'bi-heart-pulse'},
  ]},
  {group:'HR & payroll (HRMS)', items:[
    {id:'employees', label:'Employee directory', icon:'bi-people'},
    {id:'attendance', label:'Attendance & roster', icon:'bi-calendar3'},
    {id:'leave', label:'Leave management', icon:'bi-airplane'},
    {id:'payroll', label:'Payroll run', icon:'bi-cash-coin'},
    {id:'recruitment', label:'Recruitment & training', icon:'bi-mortarboard'},
  ]},
  {group:'Finance & admin', items:[
    {id:'billing', label:'Billing & invoicing', icon:'bi-receipt'},
    {id:'claims', label:'Insurance & scheme claims', icon:'bi-shield-check'},
    {id:'inventory', label:'Inventory & assets', icon:'bi-box-seam'},
    {id:'accounts', label:'Accounts & finance', icon:'bi-bank'},
    {id:'support', label:'Support services', icon:'bi-truck'},
  ]},
  {group:'Compliance & reports', items:[
    {id:'abdm', label:'ABDM / ABHA centre', icon:'bi-shield-lock'},
    {id:'mrd', label:'Medical records (MRD)', icon:'bi-archive'},
    {id:'nabh', label:'NABH checklist', icon:'bi-patch-check'},
    {id:'reports', label:'Reports & analytics', icon:'bi-bar-chart-line'},
  ]},
  {group:'System', items:[
    {id:'roles', label:'Roles & access control', icon:'bi-shield-lock-fill'},
    {id:'portal', label:'Patient portal (phase 4)', icon:'bi-phone'},
  ]},
];

const navScroll = document.getElementById('navScroll');
NAV.forEach(g => {
  const gd = document.createElement('div'); gd.className = 'sb-group';
  gd.innerHTML = `<div class="sb-group-label">${g.group}</div>` + g.items.map(it => `
    <div class="sb-item" id="nav-${it.id}" data-nav="${it.id}" data-label="${it.label}" role="button" tabindex="0">
      <i class="bi ${it.icon}"></i><span>${it.label}</span>${it.badge ? `<span class="badge">${it.badge}</span>` : ''}
    </div>`).join('');
  navScroll.appendChild(gd);
});

// one delegated listener instead of a closure per sidebar item
navScroll.addEventListener('click', e => {
  const item = e.target.closest('[data-nav]');
  if(item) show(item.dataset.nav, item.dataset.label);
});
navScroll.addEventListener('keydown', e => {
  if(e.key !== 'Enter' && e.key !== ' ') return;
  const item = e.target.closest('[data-nav]');
  if(item){ e.preventDefault(); show(item.dataset.nav, item.dataset.label); }
});

const content = document.getElementById('content');
const BUILDERS = {};
function registerScreen(id, fn){ BUILDERS[id] = fn; }

let activeNavEl = null;
let activeScreenEl = null;

function show(id, label){
  if(activeNavEl) activeNavEl.classList.remove('active');
  activeNavEl = document.getElementById('nav-' + id);
  if(activeNavEl) activeNavEl.classList.add('active');

  document.getElementById('crumbNow').textContent = label || id;
  document.getElementById('titleNow').textContent = label || id;

  if(activeScreenEl) activeScreenEl.classList.remove('active');
  let scr = document.getElementById('scr-' + id);
  if(!scr){
    scr = document.createElement('div');
    scr.className = 'screen'; scr.id = 'scr-' + id;
    scr.innerHTML = BUILDERS[id] ? BUILDERS[id]() : placeholder(label);
    content.appendChild(scr);
    if(window['init_'+id]) requestAnimationFrame(window['init_'+id]);
  }
  scr.classList.add('active');
  activeScreenEl = scr;
}

function placeholder(label){
  return `<div class="module-tag"><i class="bi bi-cone-striped"></i> Wireframe stub</div>
  <h1 class="scr">${label}</h1>
  <p class="scr-sub">Screen layout to be detailed in the next design pass: included in module list for completeness.</p>
  <div class="empty-note">Low-priority for first clickable prototype. Structure follows the same card/table pattern as the screens already built out.</div>`;
}

function tag(text){return `<div class="module-tag"><i class="bi bi-stars"></i> ${text}</div>`;}
function kpi(icoClass,icon,delta,deltaUp,n,l){
  return `<div class="kpi"><div class="top"><div class="ico ${icoClass}"><i class="bi ${icon}"></i></div>
  ${delta? `<div class="delta ${deltaUp?'up':'down'}">${deltaUp?'▲':'▼'} ${delta}</div>`:''}</div>
  <div class="n">${n}</div><div class="l">${l}</div></div>`;
}
function status(color,text){return `<span class="status ${color}"><span class="d"></span>${text}</span>`;}

/* ============== DASHBOARD ============== */
registerScreen('dashboard', () => `
  ${tag('Role: medical superintendent')}
  <h1 class="scr">Good morning, Dr. Adarsh</h1>
  <p class="scr-sub">Cross-department snapshot across all 28 modules: General Medical Hospital, Nashik · Tuesday, 30 Jun</p>

  <div class="grid kpis">
    ${kpi('blue','bi-hospital','3%',true,'412 / 500','Beds occupied today')}
    ${kpi('teal','bi-calendar2-check','12%',true,'186','OPD footfall today')}

// delegated listener: handles module-map card clicks (and any future data-goto element)
// without inline onclick strings, so labels with quotes/special characters can't break the markup
content.addEventListener('click', e => {
  const card = e.target.closest('[data-goto]');
  if(card) show(card.dataset.goto, card.dataset.label);
});
content.addEventListener('keydown', e => {
  if(e.key !== 'Enter' && e.key !== ' ') return;
  const card = e.target.closest('[data-goto]');
  if(card){ e.preventDefault(); show(card.dataset.goto, card.dataset.label); }
});
